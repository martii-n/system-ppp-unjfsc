services:
  # ===== DESARROLLO =====
  db-dev:
    profiles: ['dev']
    image: mariadb:10.11
    container_name: db-dev
    environment:
      MYSQL_DATABASE: db_system_ppp
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - '3307:3306'
    volumes:
      - dbdata-dev:/var/lib/mysql
    networks:
      - dev-network

  # ===== PRODUCCIÓN =====
  app:
    profiles: ['prod']
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: app-prod
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - APP_NAME=${APP_NAME}
      - APP_KEY=${APP_KEY}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - storage-data:/var/www/storage
    depends_on:
      - db
    networks:
      - app-network

  nginx:
    profiles: ['prod']
    image: nginx:alpine
    container_name: nginx-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/var/www/public:ro
      - ./storage/logs:/var/log/nginx
      - ./certs:/etc/nginx/certs:ro
      - storage-data:/var/www/storage:ro
    depends_on:
      - app
    networks:
      - app-network

  db:
    profiles: ['prod']
    image: mariadb:10.11
    container_name: db-prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata-prod:/var/lib/mysql
    networks:
      - app-network
    ports:
      - '3306:3306'

networks:
  dev-network:
    driver: bridge
  app-network:
    driver: bridge

volumes:
  dbdata-dev:
  dbdata-prod:
  storage-data:
